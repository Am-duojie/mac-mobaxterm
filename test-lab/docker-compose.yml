services:
  ssh:
    build:
      context: ./ssh
    container_name: macmobaxterm-lab-ssh
    ports:
      - "2222:2222"
    restart: unless-stopped

  ftp:
    build:
      context: ./ftp
    container_name: macmobaxterm-lab-ftp
    ports:
      - "2121:21"
      - "21100-21110:21100-21110"
    restart: unless-stopped

  telnet:
    build:
      context: ./telnet
    container_name: macmobaxterm-lab-telnet
    ports:
      - "2323:23"
    restart: unless-stopped
